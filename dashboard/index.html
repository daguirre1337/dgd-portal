<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGD Dashboard - Internes Portal</title>
    <link rel="icon" href="img/dgd-falcon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Login Page (shown when not authenticated) -->
    <div id="login-page" class="dgd-login-page">
        <div class="dgd-login-card">
            <div class="dgd-login-card__logo">
                <img src="img/dgd-falcon.png" alt="DGD" width="48" height="48">
                <img src="img/dgd-logo.png" alt="DGD Dashboard" style="height:28px">
            </div>
            <h2 class="dgd-login-card__title" id="auth-title">Anmelden</h2>
            <p class="dgd-login-card__subtitle" id="auth-subtitle">Internes Dashboard f&uuml;r DGD-Mitarbeiter</p>

            <form id="login-form" class="dgd-form">
                <div class="dgd-form__group">
                    <label class="dgd-form__label" for="auth-username">Benutzername</label>
                    <input type="text" id="auth-username" class="dgd-form__input dgd-form__input--lg" placeholder="Benutzername" required>
                </div>
                <div class="dgd-form__group" id="auth-email-group" style="display:none">
                    <label class="dgd-form__label" for="auth-email">E-Mail</label>
                    <input type="email" id="auth-email" class="dgd-form__input dgd-form__input--lg" placeholder="max@dgd.digital">
                </div>
                <div class="dgd-form__group" id="auth-displayname-group" style="display:none">
                    <label class="dgd-form__label" for="auth-displayname">Anzeigename</label>
                    <input type="text" id="auth-displayname" class="dgd-form__input dgd-form__input--lg" placeholder="Max Mustermann">
                </div>
                <div class="dgd-form__group">
                    <label class="dgd-form__label" for="auth-password">Passwort</label>
                    <input type="password" id="auth-password" class="dgd-form__input dgd-form__input--lg" placeholder="Passwort" required>
                </div>
                <div class="dgd-form__group" id="auth-code-group" style="display:none">
                    <label class="dgd-form__label" for="auth-invite-code">Einladungscode</label>
                    <input type="text" id="auth-invite-code" class="dgd-form__input dgd-form__input--lg" placeholder="DGD-XXXX-XXXX">
                </div>
                <div id="auth-error" class="dgd-alert dgd-alert--error dgd-hidden"></div>
                <button type="submit" id="auth-submit" class="dgd-btn dgd-btn--primary dgd-btn--lg dgd-btn--full">Anmelden</button>
            </form>
            <p class="dgd-text-center dgd-text-muted dgd-mt-md">
                <a href="#" id="auth-toggle" class="dgd-login-card__toggle">Mit Einladungscode registrieren</a>
            </p>
        </div>
    </div>

    <!-- App Shell (shown when authenticated) -->
    <div id="app-shell" class="dgd-app dgd-hidden">

        <!-- Sidebar -->
        <aside class="dgd-sidebar" id="sidebar">
            <div class="dgd-sidebar__logo">
                <img src="img/dgd-falcon.png" alt="DGD" width="28" height="28">
                <span>DGD Dashboard</span>
            </div>
            <nav class="dgd-sidebar__nav">
                <div class="dgd-sidebar__section">&Uuml;BERSICHT</div>
                <a href="#dashboard" class="dgd-sidebar__link dgd-sidebar__link--active" data-view="dashboard">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="#timeline" class="dgd-sidebar__link" data-view="timeline">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Zeitleiste
                </a>
                <a href="#kpis" class="dgd-sidebar__link" data-view="kpis">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    KPI Cockpit
                </a>
                <a href="#mitarbeiter" class="dgd-sidebar__link" data-view="mitarbeiter">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Mitarbeiter
                </a>
                <div class="dgd-sidebar__section">BUSINESS</div>
                <a href="#finanzen" class="dgd-sidebar__link" data-view="finanzen">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    Finanzen
                </a>
                <a href="#ziele" class="dgd-sidebar__link" data-view="ziele">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    Ziele
                </a>
                <a href="#feedback" class="dgd-sidebar__link" data-view="feedback">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="9" y1="10" x2="9" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/></svg>
                    Feedback
                </a>
                <div class="dgd-sidebar__section">TOOLS</div>
                <a href="#showcase" class="dgd-sidebar__link" data-view="showcase">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    Showcase Builder
                </a>
                <div class="dgd-sidebar__section">VERWALTUNG</div>
                <a href="#settings" class="dgd-sidebar__link" data-view="settings">
                    <svg class="dgd-sidebar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Einstellungen
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dgd-main" id="main">
            <header class="dgd-topbar">
                <button class="dgd-sidebar-toggle" id="sidebar-toggle" aria-label="Men&uuml;" title="Seitenleiste ein-/ausblenden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h3 class="dgd-topbar__title" id="topbar-title">Dashboard</h3>
                <div class="dgd-topbar__user">
                    <span id="topbar-username"></span>
                    <button class="dgd-btn dgd-btn--outline dgd-btn--sm" id="logout-btn">Abmelden</button>
                </div>
            </header>
            <div class="dgd-content" id="main-content">
                <!-- Views rendered here by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <script src="js/api.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/gantt.js"></script>
    <script src="js/tellent.js"></script>
    <script src="js/cortex.js"></script>

    <!-- Showcase Builder -->
    <link rel="stylesheet" href="css/showcase-builder.css">
    <script src="js/showcase-devices.js"></script>
    <script src="js/showcase-templates.js"></script>
    <script src="js/showcase-cortex.js"></script>
    <script src="js/showcase-builder.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
