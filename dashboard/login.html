<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGD Dashboard - Anmelden</title>
    <link rel="icon" href="img/dgd-falcon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,.3);
        }
        .login-card__logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .login-card__logo img { height: 32px; }
        .login-card h2 {
            color: #f1f5f9;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: .25rem;
        }
        .login-card__sub {
            color: #94a3b8;
            font-size: .875rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: .8125rem;
            font-weight: 500;
            margin-bottom: .375rem;
        }
        .form-group input {
            width: 100%;
            padding: .625rem .75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: .9375rem;
            font-family: inherit;
            transition: border-color .15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        .form-group input::placeholder { color: #475569; }
        .btn-login {
            width: 100%;
            padding: .75rem;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: .5rem;
            transition: background .15s;
        }
        .btn-login:hover { background: #2563eb; }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; }
        .alert {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: .625rem .75rem;
            border-radius: 8px;
            font-size: .8125rem;
            margin-bottom: 1rem;
            display: none;
        }
        .toggle-link {
            display: block;
            text-align: center;
            color: #60a5fa;
            font-size: .8125rem;
            margin-top: 1rem;
            text-decoration: none;
        }
        .toggle-link:hover { text-decoration: underline; }
        .back-link {
            display: block;
            text-align: center;
            color: #94a3b8;
            font-size: .8125rem;
            margin-top: .75rem;
            text-decoration: none;
            transition: color .15s;
        }
        .back-link:hover { color: #D4A843; }
        .back-link svg {
            width: 14px; height: 14px;
            vertical-align: -2px;
            margin-right: 4px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-card__logo">
            <img src="img/dgd-falcon.png" alt="DGD" width="40" height="40">
            <img src="img/dgd-logo.png" alt="DGD Dashboard" style="height:24px">
        </div>
        <h2 id="auth-title">Anmelden</h2>
        <p class="login-card__sub" id="auth-subtitle">Internes Dashboard f&uuml;r DGD-Mitarbeiter</p>

        <form id="login-form">
            <div class="form-group">
                <label for="auth-username">E-Mail / Benutzername</label>
                <input type="text" id="auth-username" placeholder="d.aguirre@dgd-direkt.de" required autocomplete="username">
            </div>
            <div class="form-group hidden" id="auth-email-group">
                <label for="auth-email">E-Mail</label>
                <input type="email" id="auth-email" placeholder="max@dgd.digital" autocomplete="email">
            </div>
            <div class="form-group hidden" id="auth-displayname-group">
                <label for="auth-displayname">Anzeigename</label>
                <input type="text" id="auth-displayname" placeholder="Max Mustermann" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="auth-password">Passwort</label>
                <input type="password" id="auth-password" placeholder="Passwort" required autocomplete="current-password">
            </div>
            <div class="form-group hidden" id="auth-code-group">
                <label for="auth-invite-code">Einladungscode</label>
                <input type="text" id="auth-invite-code" placeholder="DGD-XXXX-XXXX">
            </div>
            <div class="alert" id="auth-error"></div>
            <button type="submit" class="btn-login" id="auth-submit">Anmelden</button>
        </form>
        <a href="#" id="auth-toggle" class="toggle-link">Mit Einladungscode registrieren</a>
        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Zur&uuml;ck zu dgd.digital
        </a>
    </div>

    <script>
    (function() {
        const API_BASE = 'api/auth/';
        let isRegister = false;
        const form = document.getElementById('login-form');
        const toggle = document.getElementById('auth-toggle');
        const errEl = document.getElementById('auth-error');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');

        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            isRegister = !isRegister;
            document.getElementById('auth-email-group').classList.toggle('hidden', !isRegister);
            document.getElementById('auth-displayname-group').classList.toggle('hidden', !isRegister);
            document.getElementById('auth-code-group').classList.toggle('hidden', !isRegister);
            title.textContent = isRegister ? 'Registrieren' : 'Anmelden';
            subtitle.textContent = isRegister ? 'Neues Konto mit Einladungscode erstellen' : 'Internes Dashboard f\u00fcr DGD-Mitarbeiter';
            toggle.textContent = isRegister ? 'Bereits registriert? Anmelden' : 'Mit Einladungscode registrieren';
            document.getElementById('auth-submit').textContent = isRegister ? 'Registrieren' : 'Anmelden';
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errEl.style.display = 'none';
            const btn = document.getElementById('auth-submit');
            btn.disabled = true;

            const endpoint = isRegister ? 'register' : 'login';
            const body = {
                username: document.getElementById('auth-username').value.trim(),
                password: document.getElementById('auth-password').value,
            };
            if (isRegister) {
                body.email = document.getElementById('auth-email').value.trim();
                body.display_name = document.getElementById('auth-displayname').value.trim();
                body.invite_code = document.getElementById('auth-invite-code').value.trim();
            }

            try {
                const res = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (data.success || data.ok) {
                    window.location.href = 'index.php';
                } else {
                    errEl.textContent = data.message || 'Anmeldung fehlgeschlagen';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Verbindungsfehler. Bitte erneut versuchen.';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        });
    })();
    </script>
</body>
</html>
